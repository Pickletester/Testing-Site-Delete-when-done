<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | LevelUp Pickleball Club</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/pickletester/LevelUp-Pickleball-Club-Website/main/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #3CC440;
    --navy: #1E2B6E;
    --navy-dark: #131d4f;
    --dark: #0D0F1A;
    --white: #ffffff;
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(60,196,64,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(60,196,64,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(60px); }
  }

  /* Radial glow */
  .bg-glow {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(60,196,64,0.08) 0%, transparent 65%);
    pointer-events: none;
  }

  /* Pickleball bouncing animation */
  .ball-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .pickleball {
    position: absolute;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff 0%, #e0e0e0 60%, #bbb 100%);
    box-shadow: inset -3px -3px 6px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.4);
    animation: bounce1 4s ease-in-out infinite;
    opacity: 0.15;
  }

  .pickleball::after {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 1.5px dashed rgba(0,0,0,0.15);
  }

  .pickleball:nth-child(1) { left: 10%; animation: bounce1 5s ease-in-out infinite; }
  .pickleball:nth-child(2) { left: 30%; animation: bounce2 7s ease-in-out infinite 1s; }
  .pickleball:nth-child(3) { left: 60%; animation: bounce1 6s ease-in-out infinite 0.5s; }
  .pickleball:nth-child(4) { left: 80%; animation: bounce2 8s ease-in-out infinite 2s; }

  @keyframes bounce1 {
    0%, 100% { top: 10%; transform: translateY(0) rotate(0deg); }
    50% { top: 80%; transform: translateY(0) rotate(180deg); }
  }
  @keyframes bounce2 {
    0%, 100% { top: 80%; transform: translateY(0) rotate(0deg); }
    50% { top: 10%; transform: translateY(0) rotate(-180deg); }
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    max-width: 700px;
  }

  /* Logo */
  .logo {
    margin-bottom: 2.5rem;
    animation: fadeDown 0.6s ease both;
  }

  .logo img {
    height: 56px;
    width: auto;
    filter: brightness(1);
  }

  /* 404 number */
  .error-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(8rem, 20vw, 14rem);
    line-height: 0.85;
    color: var(--white);
    letter-spacing: -4px;
    animation: fadeDown 0.7s ease 0.1s both;
    position: relative;
    display: inline-block;
  }

  .error-num .zero {
    color: var(--green);
    position: relative;
    display: inline-block;
    animation: spin404 8s linear infinite;
  }

  @keyframes spin404 {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Court line accent */
  .court-line {
    width: 120px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    margin: 1rem auto;
    animation: fadeIn 0.8s ease 0.3s both;
  }

  /* Headline */
  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    letter-spacing: 0.05em;
    color: var(--white);
    margin-bottom: 1rem;
    animation: fadeUp 0.7s ease 0.3s both;
  }

  .headline span { color: var(--green); }

  /* Subtext */
  .subtext {
    font-size: 1rem;
    color: rgba(255,255,255,0.5);
    line-height: 1.7;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.7s ease 0.4s both;
  }

  /* Buttons */
  .btns {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeUp 0.7s ease 0.5s both;
  }

  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.9rem 2.2rem;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s ease;
    display: inline-block;
  }

  .btn-green {
    background: var(--green);
    color: var(--dark);
  }
  .btn-green:hover {
    background: #5de061;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(60,196,64,0.35);
  }

  .btn-outline {
    background: transparent;
    color: var(--white);
    border: 2px solid rgba(255,255,255,0.25);
  }
  .btn-outline:hover {
    border-color: var(--white);
    transform: translateY(-2px);
  }

  /* Bottom nav hint */
  .hint {
    margin-top: 3rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    animation: fadeUp 0.7s ease 0.6s both;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Nav bar */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--navy-dark);
    border-bottom: 3px solid var(--green);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: white;
    text-decoration: none;
  }
  .nav-logo span { color: var(--green); }

  .nav-home {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-home:hover { color: var(--green); }
</style>
</head>

  <div class="hint">LevelUp Pickleball Club &nbsp;·&nbsp; 33 Mayview Road, Canonsburg PA</div>

</div>

</html>
